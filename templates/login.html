{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card form-card p-4">
            <h2 class="card-header-title mb-3">Login</h2>
            <p class="text-secondary">Enter your credentials to access your student or admin dashboard.</p>
            <form method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="text-center mt-3">
                <span class="text-muted">New to the portal?</span>
                <a href="{{ url_for('auth.register') }}">Create an account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
